<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Site</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 80px auto;
      padding: 0 20px;
      color: #222;
    }
    h1 { color: #4f46e5; }
    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
    #message { margin-top: 16px; font-style: italic; }
  </style>
</head>
<body>
  <h1>Hello from the demo site</h1>
  <p>A minimal page to test the feature branch.</p>
  <button onclick="document.getElementById('message').textContent = 'It works!'">Click me</button>
  <p id="message"></p>
</body>
</html>
